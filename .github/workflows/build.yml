name: Build kernel

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y make nasm gcc
      - name: Build kernel
        run: make -C kernel
